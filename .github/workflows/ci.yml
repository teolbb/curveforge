name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Ruff lint
        run: ruff check
      - name: Ruff format check
        run: ruff format --check
      - name: Literal-size check (no big hardcoded arrays)
        run: python tools/check_literal_size.py src/curveforge
      - name: Mypy
        run: mypy src
      - name: Pyright
        run: pyright src
      - name: Pytest
        run: pytest --cov --cov-report=term-missing
